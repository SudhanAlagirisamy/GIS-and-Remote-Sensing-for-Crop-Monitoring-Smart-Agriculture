<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register | Smart Crop Monitoring</title>

    <script src="https://cdn.tailwindcss.com"></script>

    <style>
        body {
            background: linear-gradient(135deg, #020617, #0f172a, #020617);
        }
        .glass {
            background: rgba(255,255,255,0.06);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255,255,255,0.1);
        }
        .input-field {
            background: rgba(255,255,255,0.08);
        }
        .input-field:focus {
            outline: none;
            box-shadow: 0 0 0 2px #22c55e;
        }
    </style>
</head>

<body class="text-white flex items-center justify-center min-h-screen px-4">

<div class="w-full max-w-md">

    <!-- CARD -->
    <div class="glass rounded-2xl p-8 shadow-xl">

        <!-- TITLE -->
        <div class="text-center mb-6">
            <h1 class="text-3xl font-bold">📝 Create Account</h1>
            <p class="text-gray-400 text-sm mt-2">Start your NDVI analysis journey</p>
        </div>

        <!-- ERROR -->
        {% if error %}
        <div class="bg-red-500/20 border border-red-500 text-red-300 p-3 rounded mb-4 text-sm">
            {{ error }}
        </div>
        {% endif %}

        <!-- FORM -->
        <form method="POST" class="space-y-4">

            <input type="text" name="username" placeholder="Username" required
                   class="w-full px-4 py-3 rounded-lg input-field">

            <div class="relative">
                <input type="password" name="password" id="password" placeholder="Password" required
                       class="w-full px-4 py-3 rounded-lg input-field pr-10">
                <span onclick="togglePassword('password', this)"
                      class="absolute right-3 top-3 cursor-pointer text-gray-400">👁️</span>
            </div>

            <div class="relative">
                <input type="password" name="confirm_password" id="confirm_password" placeholder="Confirm Password" required
                       class="w-full px-4 py-3 rounded-lg input-field pr-10">
                <span onclick="togglePassword('confirm_password', this)"
                      class="absolute right-3 top-3 cursor-pointer text-gray-400">👁️</span>
            </div>

            <button type="submit"
                    class="w-full py-3 bg-green-500 rounded-lg font-semibold hover:bg-green-600 transition">
                🚀 Register
            </button>
        </form>

        <!-- LOGIN LINK -->
        <p class="text-center mt-6 text-sm text-gray-400">
            Already have an account?
            <a href="{{ url_for('login') }}" class="text-green-400 hover:underline">
                Login
            </a>
        </p>

    </div>

    <!-- BACK -->
    <div class="text-center mt-4">
        <a href="/" class="text-gray-400 hover:text-green-400 text-sm">⬅ Back to Home</a>
    </div>

</div>

<script>
function togglePassword(id, el) {
    const input = document.getElementById(id);
    if (input.type === "password") {
        input.type = "text";
        el.textContent = "🙈";
    } else {
        input.type = "password";
        el.textContent = "👁️";
    }
}
</script>

</body>
</html>
